name: sync-fork-official
permissions:
  contents: write
  pull-requests: write
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork == true }}
    steps:
      - name: 调用GitHub官方merge-upstream接口
        uses: actions/github-script@v8
        with:
          script: |
            const repoFull = context.repo.owner + "/" + context.repo.repo;
            try {
              const res = await github.rest.repos.mergeUpstream({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: "master"
              });
              console.log("同步成功：", res.data);
            } catch (err)
              if (err.status === 409) {
                console.log("无需同步/存在冲突，请手动页面Sync fork");
              } else {
                throw err;
              }
            }
